<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAPA ❤️ CHERRY</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:black;
color:white;
overflow-x:hidden;
scroll-behavior:smooth;
}

/* START SCREEN */
#startScreen{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
cursor:pointer;
text-align:center;
padding:20px;
}

#startScreen h1{
font-size:28px;
letter-spacing:4px;
animation:blink 1.5s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

/* MAIN SECTIONS */
.section{
min-height:100vh;
padding:40px 20px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero{
background:linear-gradient(135deg,#000000,#330033);
}

.hero h1{
font-size:26px;
margin-bottom:20px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #ff66cc;}
to{text-shadow:0 0 25px #ffd700;}
}

/* PHOTO */
.photo img{
width:90%;
max-width:350px;
border-radius:20px;
box-shadow:0 0 25px rgba(255,215,0,0.6);
animation:zoom 15s infinite alternate ease-in-out;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.05);}
}

/* MESSAGE */
.message{
margin-top:25px;
font-size:15px;
line-height:1.8em;
letter-spacing:1.5px;
max-width:500px;
}

/* PROPOSAL */
.proposal{
background:black;
}

button{
margin:15px;
padding:12px 25px;
border-radius:30px;
border:none;
background:linear-gradient(to right,#ffd700,#ff66cc);
color:black;
font-weight:bold;
cursor:pointer;
}

/* FINAL SCREEN */
#final{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
font-size:18px;
}

/* HEARTS */
.heart{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(100vh);opacity:0;}
}

/* RESPONSIVE */
@media(min-width:768px){
.hero h1{
font-size:36px;
}
.message{
font-size:18px;
}
}
</style>
</head>

<body>

<div id="startScreen" onclick="enterSite()">
<h1>TAP ON THIS ❤️</h1>
</div>

<div id="mainContent" style="display:none;">

<section class="section hero">
<h1>HAPPY BIRTHDAY PAPA 👑❤️</h1>

<div class="photo">
<img src="love.jpg">
</div>

<div class="message">
<p id="typing"></p>
</div>
</section>

<section class="section proposal">
<h1>WILL YOU BE MINE FOREVER? 💍</h1>
<button onclick="accept()">YES 💖</button>
<button id="noBtn">NO 😜</button>
</section>

</div>

<div id="final">
<h1>PAPA ❤️</h1>
<p>I LOVE YOU FOREVER 👑💍</p>
<p>YOU MADE CHERRY THE HAPPIEST PERSON ALIVE 🍒</p>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* ENTER SITE */
function enterSite(){
document.getElementById("startScreen").style.display="none";
document.getElementById("mainContent").style.display="block";
document.getElementById("music").play();
typing();
}

/* TYPING EFFECT */
var text="PAPA, YOU ARE MY QUEEN. YOU ARE MY PEACE. YOU ARE MY SMILE. ON THIS BEAUTIFUL APRIL 5, I PROMISE TO LOVE YOU FOREVER. FROM YOUR CHERRY 🍒";
var i=0;

function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}
}

/* FUNNY NO BUTTON */
var no=document.getElementById("noBtn");
no.addEventListener("mouseover",function(){
no.style.position="absolute";
no.style.left=Math.random()*70+"%";
no.style.top=Math.random()*70+"%";
});

/* ACCEPT */
function accept(){
document.getElementById("final").style.display="flex";
}

/* HEARTS */
setInterval(function(){
var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),5000);
},400);

</script>

</body>
</html>
